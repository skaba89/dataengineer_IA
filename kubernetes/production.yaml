apiVersion: v1
kind: Namespace
metadata:
  name: dataspheir-production
  labels:
    name: dataspheir-production
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataspheir-config
  namespace: dataspheir-production
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_APP_URL: "https://app.dataspheir.io"
  NEXT_PUBLIC_APP_NAME: "DataSphere Innovation"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataspheir-app
  namespace: dataspheir-production
  labels:
    app: dataspheir
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dataspheir
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dataspheir
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: dataspheir
        image: ghcr.io/skaba89/dataengineer_ia:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: dataspheir-config
        - secretRef:
            name: dataspheir-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: dataspheir
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: dataspheir-service
  namespace: dataspheir-production
  labels:
    app: dataspheir
spec:
  type: ClusterIP
  selector:
    app: dataspheir
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataspheir-ingress
  namespace: dataspheir-production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.dataspheir.io
    - api.dataspheir.io
    secretName: dataspheir-tls
  rules:
  - host: app.dataspheir.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dataspheir-service
            port:
              number: 80
  - host: api.dataspheir.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dataspheir-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dataspheir-hpa
  namespace: dataspheir-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dataspheir-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 4
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dataspheir-pdb
  namespace: dataspheir-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: dataspheir

# DataSphere Innovation - Kubernetes Production Deployment
# Multi-environment configuration with auto-scaling

apiVersion: v1
kind: Namespace
metadata:
  name: datasphere
  labels:
    app: datasphere
    environment: production
---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: datasphere-config
  namespace: datasphere
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  REDIS_URL: "redis://redis-service:6379"
  DATABASE_POOL_SIZE: "25"
---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: datasphere-secrets
  namespace: datasphere
type: Opaque
stringData:
  DATABASE_URL: "postgresql://datasphere:${POSTGRES_PASSWORD}@postgres-service:5432/datasphere"
  NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datasphere-app
  namespace: datasphere
  labels:
    app: datasphere
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: datasphere
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: datasphere
        component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: datasphere-service-account
      containers:
        - name: datasphere-web
          image: datasphere/app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: datasphere-config
            - secretRef:
                name: datasphere-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: datasphere
                    component: web
                topologyKey: kubernetes.io/hostname
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datasphere-hpa
  namespace: datasphere
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datasphere-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "1000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: datasphere-service
  namespace: datasphere
spec:
  type: ClusterIP
  selector:
    app: datasphere
    component: web
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datasphere-ingress
  namespace: datasphere
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - datasphere.io
        - api.datasphere.io
      secretName: datasphere-tls
  rules:
    - host: datasphere.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: datasphere-service
                port:
                  number: 80
    - host: api.datasphere.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: datasphere-service
                port:
                  number: 80
---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: datasphere
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: datasphere
      component: database
  template:
    metadata:
      labels:
        app: datasphere
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: datasphere
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: datasphere-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datasphere-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - datasphere
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: datasphere
spec:
  type: ClusterIP
  selector:
    app: datasphere
    component: database
  ports:
    - port: 5432
      targetPort: 5432
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: datasphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: datasphere
      component: cache
  template:
    metadata:
      labels:
        app: datasphere
        component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: datasphere
spec:
  type: ClusterIP
  selector:
    app: datasphere
    component: cache
  ports:
    - port: 6379
      targetPort: 6379
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datasphere-service-account
  namespace: datasphere
automountServiceAccountToken: true
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: datasphere-pdb
  namespace: datasphere
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: datasphere
      component: web
---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: datasphere-network-policy
  namespace: datasphere
spec:
  podSelector:
    matchLabels:
      app: datasphere
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: datasphere
              component: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: datasphere
              component: cache
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

# Grafana Dashboard Provider Configuration
apiVersion: 1

providers:
  - name: 'DataSphere Dashboards'
    orgId: 1
    folder: 'DataSphere'
    folderUid: 'datasphere'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
